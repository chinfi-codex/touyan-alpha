<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Touyan Alpha Report - 2026-03-01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0:#f3f6f9;
      --bg1:#ffffff;
      --ink:#10212f;
      --muted:#537089;
      --line:#d4e0ea;
      --accent:#0f6ba8;
      --accent2:#0b8f6a;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"Noto Sans SC","Sora",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 500px at 10% -10%, #dff4ef, transparent 65%),
        radial-gradient(1000px 500px at 90% -20%, #dcebf8, transparent 65%),
        var(--bg0);
    }
    .wrap { max-width:1360px; margin:0 auto; padding:28px 20px 40px; }
    h1,h2,h3 { margin:0; font-family:"Sora","Noto Sans SC",sans-serif; }
    .meta { margin-top:8px; color:var(--muted); font-size:14px; }
    .cards {
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
    }
    .card, .panel, .subpanel {
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 8px 20px rgba(16,33,47,.06);
    }
    .card { padding:14px; }
    .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.7px; }
    .v { margin-top:6px; font-size:28px; font-weight:700; color:var(--accent); }
    .sections { margin-top:18px; display:grid; gap:14px; }
    .panel { padding:14px; overflow:auto; }
    .panel h2 { margin-bottom:10px; }
    .panel h2 span, .subpanel h3 span { color:var(--muted); font-weight:500; font-size:13px; }
    .stack { display:grid; gap:12px; }
    .subpanel { padding:12px; }
    .subpanel h3 { margin-bottom:8px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { border-bottom:1px solid var(--line); padding:8px 6px; text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    td.title { min-width:320px; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .empty { color:var(--muted); font-size:14px; }
    @media (max-width:980px) {
      td.title { min-width:220px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Touyan Alpha 静态日报</h1>
    <div class="meta">Date: 2026-03-01 | Slot: 0700</div>

    <section class="cards">
      
        <section class="card">
          <div class="k">业绩预告</div>
          <div class="v">0</div>
        </section>
        
        <section class="card">
          <div class="k">新闻</div>
          <div class="v">0</div>
        </section>
        
        <section class="card">
          <div class="k">机构调研</div>
          <div class="v">0</div>
        </section>
        
        <section class="card">
          <div class="k">互动问答</div>
          <div class="v">0</div>
        </section>
        
        <section class="card">
          <div class="k">公告</div>
          <div class="v">0</div>
        </section>
        
    </section>

    <section class="sections">
      
    <section class="panel">
      <h2>业绩预告 <span>(0)</span></h2>
      <table>
        <thead><tr><th>Date</th><th>Symbol</th><th>Company</th><th>变动下限</th><th>变动上限</th><th>变动原因</th><th>Summary</th><th>URL</th></tr></thead>
        <tbody><tr><td colspan='8'>无数据</td></tr></tbody>
      </table>
    </section>
    
      
    <section class="panel">
      <h2>新闻 <span>(0)</span></h2>
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Domain</th><th>Title</th><th>Summary</th><th>URL</th></tr></thead>
        <tbody><tr><td colspan='6'>无数据</td></tr></tbody>
      </table>
    </section>
    
      
    <section class="panel">
      <h2>机构调研 <span>(0)</span></h2>
      <table>
        <thead><tr><th>Date</th><th>Symbol</th><th>Company</th><th>Title</th><th>URL</th></tr></thead>
        <tbody><tr><td colspan='5'>无数据</td></tr></tbody>
      </table>
    </section>
    
      
    <section class="panel">
      <h2>互动问答 <span>(0)</span></h2>
      <table>
        <thead><tr><th>Date</th><th>Symbol</th><th>Company</th><th>Question</th><th>Answer</th><th>URL</th></tr></thead>
        <tbody><tr><td colspan='6'>无数据</td></tr></tbody>
      </table>
    </section>
    
      
    <section class="panel">
      <h2>公告 <span>(0)</span></h2>
      <div class="stack">
        <section class='subpanel'><h3>公告</h3><div class='empty'>无非“其他”公告</div></section>
      </div>
    </section>
    
    </section>
  </main>
</body>
</html>
