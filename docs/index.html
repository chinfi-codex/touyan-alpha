<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Touyan Alpha 每日汇总</title>
  <meta name="description" content="Touyan Alpha 每日汇总首页，查看最近更新记录与日报入口">
  <style>
    :root{--bg:#eef1f5;--panel:#ffffff;--panel-soft:#f7f8fb;--line:#dde3eb;--line-strong:#cdd5df;--text:#161c24;--muted:#667085;--muted-2:#8a94a6;--accent:#ff6a00;--accent-soft:#fff2e8;--shadow:0 8px 24px rgba(15,23,42,.05);--warn-bg:#fff8ec;--warn-line:#ffd8a8;--ok:#2f9e61;--bad:#d94841;--run:#2b6fd6;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:Consolas,"SFMono-Regular",monospace}
    *{box-sizing:border-box} html{scroll-behavior:smooth;scroll-padding-top:68px} body{margin:0;background:linear-gradient(180deg,#f7f8fa 0%,var(--bg) 220px);color:var(--text);font-family:var(--sans)} a{color:#0b63ce;text-decoration:none} a:hover{text-decoration:underline} .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 32px}
    .page-header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;padding:4px 0 10px;border-bottom:1px solid rgba(205,213,223,.75)} .title-wrap{display:grid;gap:6px} .kicker{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em} .kicker::before{content:'';width:8px;height:8px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 4px rgba(255,106,0,.12)} h1{margin:0;font-size:24px;line-height:1.1} .subtitle{color:var(--muted);font-size:13px;line-height:1.6;max-width:58ch}
    .meta-row{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px} .meta-badge{display:inline-flex;align-items:center;gap:6px;min-height:24px;padding:0 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel-soft);color:var(--muted);font-size:12px;white-space:nowrap} .meta-badge.strong{background:var(--accent-soft);border-color:#ffd0b2;color:#ad4d00;font-weight:600}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px} .action-link{display:inline-flex;align-items:center;height:36px;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.92);color:var(--muted);font-size:13px;font-weight:600;white-space:nowrap} .action-link:hover{border-color:#ffc59b;color:#a74b00;background:#fff7f1;text-decoration:none}
    .content{display:grid;grid-template-columns:minmax(0,.92fr) minmax(0,1.08fr);gap:14px;margin-top:14px;align-items:start} .panel{background:var(--panel);border:1px solid rgba(221,227,235,.95);border-radius:12px;box-shadow:var(--shadow);padding:16px} .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px} h2{margin:0;font-size:17px;line-height:1.2} .section-summary{margin-bottom:10px;color:var(--muted);font-size:12px;line-height:1.45}
    .status-list{display:grid;gap:10px} .status-row{display:grid;grid-template-columns:104px minmax(0,1fr) auto;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--panel-soft)} .status-date{font-family:var(--mono);font-size:13px;color:var(--muted)} .status-main{display:grid;gap:4px;min-width:0} .status-title{font-size:14px;font-weight:700;color:var(--text)} .status-note{font-size:12px;color:var(--muted);line-height:1.5}
    .status-pill{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:0 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid var(--line)} .status-pill.success{background:#edf9f1;border-color:#c8ebd4;color:var(--ok)} .status-pill.failure{background:#fff1f0;border-color:#ffc9c5;color:var(--bad)} .status-pill.warning{background:var(--warn-bg);border-color:var(--warn-line);color:#ad6800} .status-pill.running{background:#eef4ff;border-color:#cfe0ff;color:var(--run)} .status-pill.neutral{background:var(--panel-soft);border-color:var(--line);color:var(--muted)}
    .table-wrap{overflow:auto;border-radius:10px} table{width:100%;border-collapse:collapse;min-width:540px;font-size:13px} thead th{background:#f7f8fb;color:var(--muted);font-size:12px;font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line-strong)} td{padding:9px 10px;border-bottom:1px solid #edf1f5;vertical-align:top;line-height:1.5} tr:last-child td{border-bottom:0} tbody tr:hover td{background:#fbfcfd} .mono{font-family:var(--mono)} .link-strong{font-weight:600} .footer-note{margin-top:8px;color:var(--muted-2);font-size:12px}
    .hidden{display:none!important} @media (max-width:980px){.content{grid-template-columns:1fr}} @media (max-width:768px){.wrap{padding:14px 12px 28px} .page-header{align-items:flex-start;flex-direction:column} .meta-row{justify-content:flex-start} h1{font-size:22px} .panel{padding:14px} .status-row{grid-template-columns:1fr} table{min-width:520px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="page-header">
      <div class="title-wrap">
        <span class="kicker">Alpha Daily</span>
        <div>
          <h1>Touyan Alpha 每日汇总</h1>
          <div class="subtitle">先看最近更新，再进入对应日报。首页保留最近 7 天更新记录和最近日报列表，帮助你快速判断今天是否有新内容。</div>
        </div>
        <div class="actions">
          <a id="latest-report-button" class="action-link" href="./">打开最新日报</a>
          <a class="action-link" href="https://github.com/chinfi-codex/touyan-alpha/actions/workflows/daily-update-pages.yml" target="_blank" rel="noreferrer">查看更新详情</a>
        </div>
      </div>
      <div class="meta-row">
        <span class="meta-badge strong">最新日报 <span id="hero-latest-date" class="mono">--</span></span>
        <span class="meta-badge">最近 7 天 <span id="meta-days-7" class="mono">0</span> 期</span>
        <span class="meta-badge">最近 30 天 <span id="meta-days-30" class="mono">0</span> 期</span>
        <span class="meta-badge">更新于 <span id="footer-updated-at" class="mono">--</span> UTC</span>
      </div>
    </header>

    <section class="content">
      <article class="panel">
        <div class="section-head"><h2>近 7 天更新记录</h2></div>
        <div class="section-summary">按自然日展示最近更新结果。你可以直接查看当天记录，判断是否已经更新完成。</div>
        <div id="status-list" class="status-list"></div>
        <div id="status-fallback" class="footer-note hidden">最近更新记录暂时无法加载。你仍可以查看日报列表，或前往详情页查看当天情况。</div>
      </article>
      <article class="panel">
        <div class="section-head"><h2>日报列表</h2></div>
        <div class="section-summary">保留最近 30 天日报入口，方便从日期快速回看。主要内容一栏帮助你大致判断当日重点。</div>
        <div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>日期</th><th>链接</th><th>主要内容</th></tr></thead>
              <tbody id="reports-table-body"></tbody>
            </table>
          </div>
        </div>
      </article>
    </section>
  </main>
  <script>
    const ACTIONS_URL = "https://github.com/chinfi-codex/touyan-alpha/actions/workflows/daily-update-pages.yml";
    const RUNS_API_URL = "https://api.github.com/repos/chinfi-codex/touyan-alpha/actions/workflows/daily-update-pages.yml/runs?per_page=14";
    const INITIAL_MANIFEST = {"updated_at":"2026-03-08T02:52:23.141304+00:00","days":{"2026-03-07":{"counts":{"cninfo_fulltext":1133,"cninfo_relation":0,"p5w_interaction":5,"tushare_forecast":1},"errors":{},"page":"2026-03-07/index.html"}}};
    const INITIAL_ENTRIES = [{"date":"2026-03-07","page":"2026-03-07/index.html","counts":{"cninfo_fulltext":1133,"cninfo_relation":0,"p5w_interaction":5,"tushare_forecast":1},"errors":{},"count_total":1139,"error_count":0}];
    const INITIAL_SUMMARY = {"latest_date":"2026-03-07","latest_page":"2026-03-07/index.html","latest_counts":{"cninfo_fulltext":1133,"cninfo_relation":0,"p5w_interaction":5,"tushare_forecast":1},"days_7":1,"days_30":1,"last_updated":"2026-03-08T02:52:23.141304+00:00"};
    const SOURCE_LABELS = {
      cninfo_fulltext: "公告全文",
      cninfo_relation: "机构调研",
      p5w_interaction: "互动问答",
      tushare_forecast: "业绩预告",
      tavily_news: "新闻动态",
      zsxq: "知识星球",
      clippings: "Clippings",
    };
    const STATUS_META = {
      success: { label: "成功", tone: "success" },
      failure: { label: "失败", tone: "failure" },
      cancelled: { label: "取消", tone: "warning" },
      skipped: { label: "跳过", tone: "warning" },
      timed_out: { label: "超时", tone: "failure" },
      action_required: { label: "待处理", tone: "warning" },
      queued: { label: "排队中", tone: "warning" },
      in_progress: { label: "运行中", tone: "running" },
      completed: { label: "已完成", tone: "neutral" },
      unavailable: { label: "不可用", tone: "neutral" },
      unknown: { label: "未知", tone: "neutral" },
    };
    const state = { manifest: INITIAL_MANIFEST, entries: INITIAL_ENTRIES, summary: INITIAL_SUMMARY };

    function fmtNum(value) {
      return new Intl.NumberFormat("zh-CN").format(Number(value || 0));
    }

    function fmtUtc(iso) {
      if (!iso) return "--";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "--";
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit",
        hour12: false, timeZone: "UTC",
      }).format(d);
    }

    function fmtSh(iso) {
      if (!iso) return "--";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "--";
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit",
        hour12: false, timeZone: "Asia/Shanghai",
      }).format(d);
    }

    function shDay(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Shanghai", year: "numeric", month: "2-digit", day: "2-digit",
      }).formatToParts(d);
      const out = {};
      for (const p of parts) if (p.type !== "literal") out[p.type] = p.value;
      return `${out.year}-${out.month}-${out.day}`;
    }

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function badgeClass(tone) {
      return `badge ${tone || "neutral"}`;
    }

    function sourceLabel(key) {
      return SOURCE_LABELS[key] || key;
    }

    function countTotal(counts) {
      return Object.values(counts || {}).reduce((sum, value) => sum + (Number(value) || 0), 0);
    }

    function topSources(counts, limit = 3) {
      return Object.entries(counts || {})
        .sort((a, b) => (Number(b[1]) || 0) - (Number(a[1]) || 0))
        .slice(0, limit)
        .map(([key, value]) => `${sourceLabel(key)} ${fmtNum(value)}`);
    }

    function normalizeRun(run) {
      const status = run.status || "unknown";
      const conclusion = run.conclusion || "";
      let stateKey = "unknown";
      if (status === "in_progress") stateKey = "in_progress";
      else if (status === "queued") stateKey = "queued";
      else if (status === "completed") stateKey = conclusion || "completed";
      const meta = STATUS_META[stateKey] || STATUS_META.unknown;
      const started = run.run_started_at || run.created_at || "";
      const updated = run.updated_at || "";
      let duration = null;
      if (started && updated) {
        const ms = new Date(updated).getTime() - new Date(started).getTime();
        if (!Number.isNaN(ms) && ms >= 0) duration = Math.round(ms / 60000);
      }
      return {
        ...run,
        stateKey,
        label: meta.label,
        tone: meta.tone,
        shanghaiDay: shDay(started || updated || run.created_at),
        durationMinutes: duration,
      };
    }

    function renderManifest() {
      const latest = state.entries[0] || null;
      document.getElementById("hero-latest-date").textContent = state.summary.latest_date || "--";
      document.getElementById("latest-report-button").setAttribute("href", latest ? `./${latest.page}` : "./");
      document.getElementById("meta-days-7").textContent = fmtNum(state.summary.days_7 || 0);
      document.getElementById("meta-days-30").textContent = fmtNum(state.summary.days_30 || 0);
      document.getElementById("footer-updated-at").textContent = fmtUtc(state.summary.last_updated || state.manifest.updated_at);

      document.getElementById("reports-table-body").innerHTML = state.entries.length
        ? state.entries.map((entry) => `
            <tr>
              <td class="mono strong">${esc(entry.date)}</td>
              <td><a class="link-strong" href="./${esc(entry.page)}">打开日报</a></td>
              <td>${esc(topSources(entry.counts).join(" / ") || "暂无")}</td>
            </tr>
          `).join("")
        : `<tr><td colspan="3" class="muted">暂无已发布日报</td></tr>`;
    }

    function renderRunFallback() {
      document.getElementById("status-fallback").classList.remove("hidden");
      document.getElementById("status-list").innerHTML = `
        <div class="status-row">
          <div class="status-date mono">--</div>
          <div class="status-main">
            <div class="status-title">最近更新记录暂时不可用</div>
            <div class="status-note">不影响浏览日报列表，你也可以打开详情页查看更新情况。</div>
          </div>
          <a class="link-strong" href="${ACTIONS_URL}" target="_blank" rel="noreferrer">查看详情</a>
        </div>
      `;
    }

    function renderRuns(rawRuns) {
      const runs = (rawRuns || []).map(normalizeRun);
      const byDay = new Map();
      for (const run of runs) if (run.shanghaiDay && !byDay.has(run.shanghaiDay)) byDay.set(run.shanghaiDay, run);
      const days = Array.from(byDay.values()).sort((a, b) => String(b.shanghaiDay).localeCompare(String(a.shanghaiDay))).slice(0, 7);
      document.getElementById("status-fallback").classList.add("hidden");

      document.getElementById("status-list").innerHTML = days.length
        ? days.map((run) => `
            <div class="status-row">
              <div class="status-date">${esc(run.shanghaiDay)}</div>
              <div class="status-main">
                <div class="status-title">更新${esc(run.label)}</div>
                <div class="status-note">记录时间 ${esc(fmtSh(run.run_started_at || run.created_at))}${run.durationMinutes != null ? ` · 用时 ${run.durationMinutes} 分钟` : ""}</div>
              </div>
              <a class="status-pill ${esc(run.tone)}" href="${esc(run.html_url || ACTIONS_URL)}" target="_blank" rel="noreferrer">${esc(run.label)}</a>
            </div>
          `).join("")
        : `<div class="status-row"><div class="status-date mono">--</div><div class="status-main"><div class="status-title">最近 7 天暂无更新记录</div><div class="status-note">你可以稍后再看，或直接打开最新日报。</div></div><a class="link-strong" href="${ACTIONS_URL}" target="_blank" rel="noreferrer">查看详情</a></div>`;
    }

    async function loadManifest() {
      try {
        const res = await fetch("./manifest.json", { cache: "no-store" });
        if (!res.ok) throw new Error("manifest");
        const manifest = await res.json();
        if (manifest && typeof manifest === "object" && manifest.days && typeof manifest.days === "object") {
          const entries = Object.entries(manifest.days).map(([date, raw]) => {
            const counts = raw && typeof raw.counts === "object" ? raw.counts : {};
            const errors = raw && typeof raw.errors === "object" ? raw.errors : {};
            return {
              date,
              page: raw.page || `${date}/index.html`,
              counts,
              errors,
              count_total: countTotal(counts),
              error_count: Object.values(errors).filter(Boolean).length,
            };
          }).sort((a, b) => String(b.date).localeCompare(String(a.date)));
          state.manifest = manifest;
          state.entries = entries.slice(0, 30);
          state.summary = {
            latest_date: state.entries[0] ? state.entries[0].date : "",
            latest_page: state.entries[0] ? state.entries[0].page : "",
            latest_counts: state.entries[0] ? state.entries[0].counts : {},
            days_7: state.entries.slice(0, 7).length,
            days_30: state.entries.slice(0, 30).length,
            last_updated: manifest.updated_at || INITIAL_SUMMARY.last_updated,
          };
        }
      } catch (_e) {
      }
      renderManifest();
    }

    async function loadRuns() {
      try {
        const res = await fetch(RUNS_API_URL, {
          headers: { Accept: "application/vnd.github+json" },
          cache: "no-store",
        });
        if (!res.ok) throw new Error("runs");
        const payload = await res.json();
        renderRuns(Array.isArray(payload.workflow_runs) ? payload.workflow_runs : []);
      } catch (_e) {
        renderRunFallback();
      }
    }

    renderManifest();
    loadManifest();
    loadRuns();
  </script>
</body>
</html>
