name: daily-update-pages

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD (optional)'
        required: false
      slot:
        description: '0700 or 2200 (optional, default 2200)'
        required: false
  schedule:
    # 07:10 CST
    - cron: '10 23 * * *'
    # 22:10 CST
    - cron: '10 14 * * *'

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv tushare

      - name: Resolve date/slot
        id: meta
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          SLOT="2200"
          DATE=""

          if [ "$EVENT" = "workflow_dispatch" ]; then
            SLOT="${{ github.event.inputs.slot }}"
            DATE="${{ github.event.inputs.date }}"
            if [ -z "$SLOT" ]; then SLOT="2200"; fi
          elif [ "$EVENT" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "10 23 * * *" ]; then
              SLOT="0700"
            else
              SLOT="2200"
            fi
          fi

          if [ -z "$DATE" ]; then
            DATE=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Shanghai')).strftime('%Y-%m-%d'))")
          fi

          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Using DATE=$DATE SLOT=$SLOT EVENT=$EVENT"

      - name: Collect data
        run: |
          python collect.py --date "${{ steps.meta.outputs.date }}" --slot "${{ steps.meta.outputs.slot }}"

      - name: Render report
        run: |
          python render_static_report.py --date "${{ steps.meta.outputs.date }}"

      - name: Publish to docs/
        run: |
          python scripts/publish_daily.py --date "${{ steps.meta.outputs.date }}" --slot "${{ steps.meta.outputs.slot }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update ${{ steps.meta.outputs.date }} slot=${{ steps.meta.outputs.slot }}"
            git push
          fi
