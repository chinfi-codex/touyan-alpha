name: daily-update-pages

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD (optional)'
        required: false
  schedule:
    # 每天 21:00 CST (13:00 UTC) 执行一次
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv tushare

      - name: Resolve date
        id: meta
        shell: bash
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Shanghai')).strftime('%Y-%m-%d'))")
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Using DATE=$DATE"

      - name: Collect data
        run: |
          python collect.py --date "${{ steps.meta.outputs.date }}"

      - name: Render report
        run: |
          python render_static_report.py --date "${{ steps.meta.outputs.date }}"

      - name: Publish to docs/
        run: |
          python scripts/publish_daily.py --date "${{ steps.meta.outputs.date }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update ${{ steps.meta.outputs.date }}"
            git push
          fi
