name: daily-update-pages

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD (optional)'
        required: false
      enable_get_clue:
        description: 'Enable get clue step'
        required: false
        type: boolean
        default: false
  schedule:
    # 每天 21:00 CST (13:00 UTC) 执行一次
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      ZSXQ_COOKIE: ${{ secrets.ZSXQ_COOKIE }}
      ZSXQ_GROUP_IDS: ${{ secrets.ZSXQ_GROUP_IDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv tushare openai

      - name: Resolve date
        id: meta
        shell: bash
        run: |
          DATE="${{ github.event.inputs.date }}"
          EVENT_NAME="${{ github.event_name }}"

          if [ -z "$DATE" ]; then
            if [ "$EVENT_NAME" = "schedule" ]; then
              # 定时任务使用 UTC 日期，避免调度延迟跨过上海零点导致日期偏移
              DATE=$(date -u +"%F")
            else
              # 手动触发默认仍按上海日期
              DATE=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Shanghai')).strftime('%Y-%m-%d'))")
            fi
          fi

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Using EVENT_NAME=$EVENT_NAME DATE=$DATE"

      - name: Collect data
        run: |
          python collect.py --date "${{ steps.meta.outputs.date }}"

      - name: Get clue (manual opt-in only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_get_clue == true }}
        run: |
          python scripts/gen_clues_json.py --date "${{ steps.meta.outputs.date }}"

      - name: Render report
        run: |
          python render_static_report.py --date "${{ steps.meta.outputs.date }}"

      - name: Publish to docs/
        run: |
          python scripts/publish_daily.py --date "${{ steps.meta.outputs.date }}"

      - name: Commit and push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update ${{ steps.meta.outputs.date }}"
            git push origin "HEAD:${BRANCH_NAME}"
          fi
